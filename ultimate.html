<!DOCTYPE html>
<html>
<head>
    <title>My World</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
        }

        .content {
            position: relative;
            top: 40%;
            transform: translateY(-50%);
        }

        h1 {
            font-size: 50px;
            color: pink;
        }

        #text {
            font-size: 20px;
            width: 80%;
            margin: auto;
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: red;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Music -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/1G4isv_Fylg?autoplay=1&loop=1&playlist=1G4isv_Fylg">
</iframe>

<div class="content">
    <h1>Stay Strong 🖤</h1>
    <div id="text"></div>
    <button onclick="showMsg()">Click Me</button>
</div>

<script>
/* Typing Effect */
let message = "You felt pain... but you are still strong. One day, someone will choose you without confusion ❤️";
let i = 0;

function type() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

/* Button Message */
function showMsg() {
    alert("You are not alone bro 💪");
}

/* Background Particles */
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y += 0.5;
        if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
